name: oyno_sports
description: Oyno Sports Community - sports booking and player matching app

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0
  web_socket_channel: ^3.0.1
  shimmer: ^3.0.0
  image_picker: 1.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  image_picker_android: 0.8.12+16

flutter:
  uses-material-design: true
  assets:
    - assets/images/
