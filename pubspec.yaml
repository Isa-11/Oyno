version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
